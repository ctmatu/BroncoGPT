<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BroncoGPT – Cal Poly Pomona</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
<style>
  /* ── Guest bar (top-right, shown when not logged in) ── */
  .guest-bar {
    position: fixed;
    top: 16px;
    right: 20px;
    display: none;
    align-items: center;
    gap: 8px;
    z-index: 100;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    padding: 6px 6px 6px 12px;
    border-radius: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .guest-bar-label {
    display: none;
  }

  .guest-bar-btn {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
  }

  .guest-bar-btn.login {
    background: transparent;
    border: none;
    color: #333;
  }

  .guest-bar-btn.login:hover {
    background: rgba(0,0,0,0.05);
  }

  .guest-bar-btn.signup {
    background: #1a5c38;
    color: white;
  }

  .guest-bar-btn.signup:hover {
    background: #154d2f;
  }

  /* Push messages down so they don't hide under the guest bar */
  .guest-mode .messages {
    padding-top: 72px !important;
  }

  /* Hide sidebar when guest */
  .app.guest-mode .sidebar {
    display: none !important;
  }

  /* ── Mobile styles ── */
  @media (max-width: 640px) {
    /* Guest bar smaller on mobile */
    .guest-bar {
      top: 10px;
      right: 10px;
      padding: 4px 4px 4px 10px;
    }

    .guest-bar-btn {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* Push messages down more on mobile since bar is same height */
    .guest-mode .messages {
      padding-top: 72px !important;
    }

    /* Sidebar takes full width on mobile when open */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    /* Hamburger button for logged-in mobile */
    .mobile-menu-btn {
      display: flex;
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 300;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Overlay behind open sidebar */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 150;
    }

    .sidebar-overlay.visible {
      display: block;
    }

    /* Give main chat area breathing room on mobile */
    .main {
      width: 100% !important;
    }

    .messages {
      padding-left: 12px !important;
      padding-right: 12px !important;
    }

    .input-bar {
      margin: 0 8px 12px !important;
    }
  }

  /* Hide hamburger on desktop */
  .mobile-menu-btn {
    display: none;
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/cpp-logo.png" alt="CPP" style="width:48px;height:48px;border-radius:12px;">
      <div class="auth-logo-text">BroncoGPT</div>
      <div class="auth-logo-sub">Cal Poly Pomona Student Assistant</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="auth-error" class="auth-error" style="display:none"></div>
    <div id="auth-success" class="auth-success" style="display:none"></div>

    <div id="login-form">
      <input class="auth-input" type="email" id="login-email" placeholder="Email address">
      <input class="auth-input" type="password" id="login-password" placeholder="Password">
      <button class="auth-btn primary" onclick="handleLogin()">Sign In</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="auth-btn google" onclick="handleGoogleAuth()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <!-- Guest option -->
      <button class="auth-btn" style="margin-top:8px;background:transparent;border:1.5px solid rgba(0,0,0,0.15);color:#555;" onclick="showAppGuest()">
        Continue without account →
      </button>
    </div>

    <div id="signup-form" style="display:none">
      <input class="auth-input" type="email" id="signup-email" placeholder="Email address">
      <input class="auth-input" type="password" id="signup-password" placeholder="Password (min 6 chars)">
      <button class="auth-btn primary" onclick="handleSignup()">Create Account</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="auth-btn google" onclick="handleGoogleAuth()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="auth-btn" style="margin-top:8px;background:transparent;border:1.5px solid rgba(0,0,0,0.15);color:#555;" onclick="showAppGuest()">
        Continue without account →
      </button>
    </div>
  </div>
</div>

<!-- HAMBURGER (mobile, logged-in only) -->
<button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleMobileSidebar()">
  <svg width="18" height="18" fill="none" stroke="#333" stroke-width="2" viewBox="0 0 24 24">
    <path d="M3 12h18M3 6h18M3 18h18"/>
  </svg>
</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

<!-- GUEST BAR -->
<div class="guest-bar" id="guest-bar">
  <button class="guest-bar-btn login" onclick="openAuthModal('login')">Log In</button>
  <button class="guest-bar-btn signup" onclick="openAuthModal('signup')">Sign Up</button>
</div>

<!-- MAIN APP -->
<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo" onclick="newChat()" style="cursor:pointer">
        <img src="/static/cpp-logo.png" alt="CPP Logo" style="width:34px;height:34px;">
        <div><div class="logo-text">BroncoGPT</div></div>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>
      <button class="new-chat-btn" onclick="openSearch()" style="margin-top:8px">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Search
      </button>
    </div>

    <div class="sidebar-section">Chat History</div>
    <div class="chat-history" id="chatHistory"></div>

    <div class="sidebar-footer">
      <div id="user-email" style="margin-bottom:8px;font-size:11px;color:rgba(255,255,255,0.6)"></div>
      <button class="signout-btn" onclick="handleSignOut()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-title">Hi, I'm BroncoGPT!</div>
        <div class="suggestion-chips">
          <div class="chip" onclick="sendChip(this)">When is the application deadline?</div>
          <div class="chip" onclick="sendChip(this)">What majors are offered?</div>
          <div class="chip" onclick="sendChip(this)">Where is the financial aid office?</div>
          <div class="chip" onclick="sendChip(this)">What are the on campus dining options?</div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-bar">
        <textarea id="user-input" placeholder="Ask BroncoGPT" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="handleSend()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="search-overlay" id="search-overlay">
  <div class="search-modal">
    <div class="search-bar">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search chats">
      <button onclick="closeSearch()">✕</button>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/app.js"></script>
</body>
</html>
